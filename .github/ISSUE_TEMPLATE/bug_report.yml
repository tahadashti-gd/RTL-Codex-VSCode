name: Bug report
description: Report a reproducible problem or Codex compatibility issue.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove prompts, conversations, credentials, and other private data before submitting.
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, VS Code version, and Codex extension version.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Describe the smallest sequence that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
